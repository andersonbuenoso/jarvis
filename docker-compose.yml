services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      APP_NAME: Jarvis
      DATABASE_URL: sqlite:///./data/jarvis.db
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      TIMEZONE: America/Sao_Paulo
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      SLACK_CHANNEL_ID: ${SLACK_CHANNEL_ID:-}
      SLACK_DAILY_SUMMARY_HOUR: ${SLACK_DAILY_SUMMARY_HOUR:-8}
      SLACK_DAILY_SUMMARY_MINUTE: ${SLACK_DAILY_SUMMARY_MINUTE:-0}
      SLACK_FOCUS_REMINDER_START_HOUR: ${SLACK_FOCUS_REMINDER_START_HOUR:-8}
      SLACK_FOCUS_REMINDER_END_HOUR: ${SLACK_FOCUS_REMINDER_END_HOUR:-18}
      LONG_RUNNING_DAYS: ${LONG_RUNNING_DAYS:-3}
    volumes:
      - jarvis_sqlite:/app/data

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  jarvis_sqlite:
